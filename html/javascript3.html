<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        //function() 콜백함수, 이벤트리스너
        let num = Number(prompt("숫자 입력"));

        let sum = 0;
        for (let i = 1; i <= num; i++) {
          sum += i;
        } //end of for

        // document.write(sum);

        let div1 = document.querySelector(".innerResult");
        div1.innerHTML = "<h1>" + sum + "</h1>";
        let div2 = document.querySelector(".textResult");
      });
    </script>
  </head>
  <body>
    <div class="innerResult"></div>
    <hr />
    <div class="textResult"></div>
  </body>
</html>
